    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page de Prueba | Conexión HubSpot</title>
    <style>
        :root {
            --primary: #ff7a59;
            /* El color naranja clásico de HubSpot */
            --dark: #2d3e50;
            --light: #f5f8fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            color: var(--dark);
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        /* Estilos del Formulario */
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd6e2;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(255, 122, 89, 0.3);
        }

        input[type="submit"]{
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #e56a4c;
            transform: translateY(-1px);
        }

        .footer-note {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        .btn-primary {
    background-color: #ff5a1f; /* Naranja HubSpot */
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-primary:hover {
    background-color: #e54b1a;
}
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TDQF5PKT"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <div class="card">
        <h1>Prueba de Integración</h1>
        <p>Completa tus datos para probar la conexión con el CRM.</p>

        <form name="contacto-hubspot" method="POST" action="/success.html">
            <div class="form-group">
                <label for="firstname">Nombre</label>
                <input type="text" name="firstname" id="firstname" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" name="email" id="email" placeholder="nombre@empresa.com" required>
            </div>

            <div class="form-group">
                <label for="company">Empresa</label>
                <input type="text" name="company" id="company" placeholder="Nombre de tu empresa">
            </div>

            <input type="submit" value="Enviar a HubSpot">
            </form>
    <button type="button" id="btn-prueba-clase" class="btn-primary">
        probar analytics
    </button>
        <p class="footer-note">Los datos enviados se procesarán para la prueba de integración.</p>
    </div>


    <!-- Start of HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/51240841.js"></script>
    <!-- End of HubSpot Embed Code -->
</body>

</html>
